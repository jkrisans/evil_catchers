<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Static Index Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #333;
      line-height: 1.6;
    }

    header {
      background: #222;
      color: white;
      padding: 20px 0;
      text-align: center;
    }

    nav {
      background: #444;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 1000px;
      margin: 30px auto;
      padding: 20px;
      background: white;
      border-radius: 8px;
    }

    .hero {
      text-align: center;
      padding: 40px 20px;
    }

    .hero h1 {
      margin-bottom: 15px;
      font-size: 2.5rem;
    }

    .hero p {
      font-size: 1.1rem;
      color: #666;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #007bff;
      color: white;
      border-radius: 5px;
      text-decoration: none;
    }

    .btn:hover {
      background: #0056b3;
    }

    footer {
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      background: #222;
      color: white;
    }
  </style>
</head>
<body>

  <header>
    <h1>My Static Website</h1>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </nav>

  <div class="container">
    <section class="hero">
      <h1>Welcome!</h1>
      <p>
        This is a simple static index page created with HTML and CSS.
      </p>
      <a href="#" class="btn">Learn More</a>
    </section>
  </div>

  <footer>
    <p>&copy; 2026 My Static Website. All rights reserved.</p>
  </footer>

</body>
</html>
