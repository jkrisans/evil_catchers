<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ļaunuma ķērāji</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      color: #222;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 3rem;
    }

    .gallery {
      display: flex;
      flex-direction: column;
      gap: 50px;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 20px;
    }

    .card h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 2rem;
    }

    .card img {
      width: 100%;
      display: block;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      margin-top: 50px;
      color: #666;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2rem;
      }

      .card h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Ļaunuma ķērāji</h1>

    <div class="gallery">

      <div class="card">
        <h2>Ļaunuma ķērāji</h2>
        <img src="dino.png" alt="Comic image">
      </div>

      <div class="card">
        <h2>Ļaunuma ķērāji</h2>
        <img src="dino.png" alt="Comic image">
      </div>

      <div class="card">
        <h2>Ļaunuma ķērāji</h2>
        <img src="dino.png" alt="Comic image">
      </div>

    </div>

    <footer>
      © 2026 Ļaunuma ķērāji
    </footer>
  </div>

</body>
</html>
